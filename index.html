<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WAF Security Dashboard</title>

<!-- Bootstrap CDN -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background: linear-gradient(120deg, #0f2027, #203a43, #2c5364);
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: Arial, Helvetica, sans-serif;
    margin: 0;
}

.dashboard-card{
    width: 420px;
    padding: 35px;
    border-radius: 12px;
    background: white;
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
}

.title{
    font-weight: 600;
    text-align: center;
    margin-bottom: 25px;
}

.status-box{
    margin-top: 20px;
    padding: 12px;
    border-radius: 6px;
    text-align: center;
    font-weight: 500;
    background: #f1f3f5;
}

.safe{
    background: #d4edda;
    color: #155724;
}

.attack{
    background: #f8d7da;
    color: #721c24;
}
</style>

</head>

<body>

<div class="dashboard-card">

    <h3 class="title">🛡 WAF Security Dashboard</h3>

    <form method="POST" action="/dashboard">

        <div class="mb-3">
            <label class="form-label">Enter Input</label>

            <input
                type="text"
                name="payload"
                class="form-control"
                placeholder="Type username or query..."
                required
            >
        </div>

        <button type="submit" class="btn btn-primary w-100">
            Submit Request
        </button>

    </form>

    <div class="status-box
        {% if 'Attack Detected' in status %}
            attack
        {% elif 'Safe Input' in status %}
            safe
        {% endif %}
    " id="statusBox">

        Status: {{ status }}

    </div>

</div>

</body>
</html>
